service: nerves_hub_web

image: spendra-inc/nerves_hub_web

servers:
  web:
    hosts:
      - 162.55.36.205
    proxy:
      host: hub.spendra.swiss
      ssl: true
      app_port: 4000
    options:
      memory: 1G
      cpus: 1
      publish:
        - 4369:4369
        - 25800-25900:25800-25900
    env:
      clear:
        NERVES_HUB_APP: web
        DATABASE_AUTO_MIGRATOR: true
        RELEASE_NODE: nerves_hub_web@162.55.36.205
  device:
    hosts:
      - 138.199.151.32
    proxy: false
    options:
      memory: 1G
      cpus: 1
      publish:
        - 8080:8080
        - 4369:4369
        - 25800-25900:25800-25900
    env:
      clear:
        NERVES_HUB_APP: device
        DEVICE_PORT: 8080
        DATABASE_AUTO_MIGRATOR: false
        LOG_LEVEL: debug
        RELEASE_NODE: nerves_hub_web@138.199.151.32
      secret:
        - DEVICE_SSL_KEY
        - DEVICE_SSL_CERT

registry:
  server: ghcr.io
  username: ignore
  password:
    - GITHUB_TOKEN

env:
  secret:
    - RELEASE_COOKIE
    - DATABASE_PEM
    - DATABASE_URL
    - LIVE_VIEW_SIGNING_SALT
    - MAILGUN_API_KEY
    - S3_ACCESS_KEY_ID
    - S3_SECRET_ACCESS_KEY
    - SECRET_KEY_BASE
  clear:
    S3_BUCKET_NAME: pnp-resources-prod
    S3_REGION: eu-central-1
    TZ: Europe/Zurich
    HOST: hub.spendra.swiss
    DATABASE_SSL: true
    DATABASE_POOL_SIZE: 10
    FIRMWARE_UPLOAD_BACKEND: S3
    FROM_EMAIL: no-reply@spendra.swiss
    MAILGUN_DOMAIN: mg.spendra.swiss
    OTEL_EXPORTER: otlp
    OTEL_EXPORTER_OTLP_ENDPOINT: http://shared-otel_collector:4318
    OTEL_SERVICE_NAME: nerves-hub-web

# Aliases are triggered with "bin/kamal <alias>". You can overwrite arguments on invocation:
# "bin/kamal logs -r job" will tail logs from the first server in the job section.
aliases:
  console: app exec --interactive --reuse "/app/bin/nerves_hub remote"
  shell: app exec --interactive --reuse "/bin/sh"
  logs: app logs -f

builder:
  arch: amd64

ssh:
  user: spendra

logging:
  driver: fluentd
  options:
    tag: nerves_hub_web.prod
